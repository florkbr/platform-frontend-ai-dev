services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: bot_memory
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d bot_memory"]
      interval: 5s
      retries: 5

  memory-server:
    build:
      context: ..
      dockerfile: memory-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://bot:bot@postgres:5432/bot_memory
    volumes:
      - ./src/static:/app/src/static
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

volumes:
  pgdata:
