apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: platform-frontend-ai-dev
parameters:
- name: NAMESPACE
  value: ${NAMESPACE}
- name: BOT_IMAGE
  value: quay.io/redhat-services-prod/hcc-platex-services/platform-frontend-ai-dev
- name: MEMORY_SERVER_IMAGE
  value: quay.io/redhat-services-prod/hcc-platex-services/platform-frontend-ai-dev-memory-server
- name: PROXY_IMAGE
  value: quay.io/redhat-services-prod/hcc-platex-services/platform-frontend-ai-dev-proxy
- name: BOT_IMAGE_TAG
  required: true
- name: MEMORY_SERVER_IMAGE_TAG
  required: true
- name: PROXY_IMAGE_TAG
  required: true
- name: BOT_LABEL
  value: hcc-ai-bot
- name: BOT_REPLICAS
  value: "1"
- name: BOT_BOARD_NAME
  value: ""
- name: BOT_INCLUDE_BACKLOG
  value: "false"
- name: BOT_INSTANCE_ID
  value: ""
objects:

# ============================================================================
# Prerequisites
#
# 1. RDS instance with the pgvector extension enabled
# 2. Secret "devbot-secrets" (Vault) with the following keys:
#      bot-gh-username       — GitHub username / git name
#      bot-email             — GitHub email for git commits
#      bot-gl-name           — GitLab username / git name
#      bot-gl-email          — GitLab email for git commits
#      gh-bot-gpg-private    — GPG private key (base64)
#      gh-bot-cli-token      — GitHub personal access token
#      gl-bot-cli-token      — GitLab personal access token
#      gcp-vertex-claude-sa  — Google service account key (base64)
#      jira-email            — Jira username/email
#      jira-token            — Jira API token
#      e2e-username          — SSO username for UI verification
#      e2e-password          — SSO password for UI verification
#
# Networking (Routes, NetworkPolicies) is managed via app-interface.
#
# ============================================================================

# --- Memory Server Deployment ---
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: devbot-memory-server
    labels:
      app.kubernetes.io/name: memory-server
      app.kubernetes.io/part-of: devbot
  spec:
    replicas: 1
    selector:
      matchLabels:
        app.kubernetes.io/name: memory-server
    template:
      metadata:
        labels:
          app.kubernetes.io/name: memory-server
          app.kubernetes.io/part-of: devbot
      spec:
        containers:
        - name: memory-server
          image: ${MEMORY_SERVER_IMAGE}:${MEMORY_SERVER_IMAGE_TAG}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          ports:
          - containerPort: 8080
            name: http
            protocol: TCP
          env:
          - name: PGSQL_HOSTNAME
            valueFrom:
              secretKeyRef:
                name: platform-frontend-ai-dev-rds
                key: db.host
          - name: PGSQL_PORT
            valueFrom:
              secretKeyRef:
                name: platform-frontend-ai-dev-rds
                key: db.port
          - name: PGSQL_USER
            valueFrom:
              secretKeyRef:
                name: platform-frontend-ai-dev-rds
                key: db.user
          - name: PGSQL_PASSWORD
            valueFrom:
              secretKeyRef:
                name: platform-frontend-ai-dev-rds
                key: db.password
          - name: PGSQL_DATABASE
            valueFrom:
              secretKeyRef:
                name: platform-frontend-ai-dev-rds
                key: db.name
          - name: PGSQL_SSLMODE
            value: require
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

# --- Memory Server Service ---
- apiVersion: v1
  kind: Service
  metadata:
    name: devbot-memory-server
    labels:
      app.kubernetes.io/name: memory-server
      app.kubernetes.io/part-of: devbot
  spec:
    type: ClusterIP
    selector:
      app.kubernetes.io/name: memory-server
    ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http

# --- Proxy Deployment ---
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: devbot-proxy
    labels:
      app.kubernetes.io/name: proxy
      app.kubernetes.io/part-of: devbot
  spec:
    replicas: 1
    selector:
      matchLabels:
        app.kubernetes.io/name: proxy
    template:
      metadata:
        labels:
          app.kubernetes.io/name: proxy
          app.kubernetes.io/part-of: devbot
      spec:
        containers:
        - name: proxy
          image: ${PROXY_IMAGE}:${PROXY_IMAGE_TAG}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          ports:
          - containerPort: 3128
            name: squid
            protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 3128
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 3128
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

# --- Proxy Service ---
- apiVersion: v1
  kind: Service
  metadata:
    name: devbot-proxy
    labels:
      app.kubernetes.io/name: proxy
      app.kubernetes.io/part-of: devbot
  spec:
    type: ClusterIP
    selector:
      app.kubernetes.io/name: proxy
    ports:
    - port: 3128
      targetPort: squid
      protocol: TCP
      name: squid

# --- Bot Deployment ---
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: devbot-bot
    labels:
      app.kubernetes.io/name: bot
      app.kubernetes.io/part-of: devbot
  spec:
    replicas: ${{BOT_REPLICAS}}
    selector:
      matchLabels:
        app.kubernetes.io/name: bot
    template:
      metadata:
        labels:
          app.kubernetes.io/name: bot
          app.kubernetes.io/part-of: devbot
      spec:
        containers:
        - name: bot
          image: ${BOT_IMAGE}:${BOT_IMAGE_TAG}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          env:
          - name: BOT_LABEL
            value: ${BOT_LABEL}
          - name: BOT_MEMORY_URL
            value: http://devbot-memory-server:8080/mcp
          - name: BOT_MEMORY_HEALTH_URL
            value: http://devbot-memory-server:8080/health
          - name: BOT_MEMORY_HEALTH_TIMEOUT
            value: "120"
          - name: BOT_PROXY_HEALTH_URL
            value: http://devbot-proxy:3128
          - name: BOT_PROXY_HEALTH_TIMEOUT
            value: "60"
          - name: GOOGLE_APPLICATION_CREDENTIALS
            value: /home/botuser/sa-key.json
          # Git identity — per-platform (from Vault)
          - name: GH_USER_NAME
            valueFrom:
              secretKeyRef:
                name: devbot-secrets
                key: bot-gh-username
          - name: GH_USER_EMAIL
            valueFrom:
              secretKeyRef:
                name: devbot-secrets
                key: bot-email
          - name: GH_USERNAME
            valueFrom:
              secretKeyRef:
                name: devbot-secrets
                key: bot-gh-username
          - name: GL_USER_NAME
            valueFrom:
              secretKeyRef:
                name: devbot-secrets
                key: bot-gl-name
          - name: GL_USER_EMAIL
            valueFrom:
              secretKeyRef:
                name: devbot-secrets
                key: bot-gl-email
          - name: GL_USERNAME
            valueFrom:
              secretKeyRef:
                name: devbot-secrets
                key: bot-gl-name
          # Bot config
          - name: BOT_BOARD_NAME
            value: ${BOT_BOARD_NAME}
          - name: BOT_INCLUDE_BACKLOG
            value: ${BOT_INCLUDE_BACKLOG}
          - name: BOT_INSTANCE_ID
            value: ${BOT_INSTANCE_ID}
          - name: BOT_DASHBOARD_URL
            value: http://devbot-memory-server:8080/api/bot-status
          - name: COSTS_API_URL
            value: http://devbot-memory-server:8080/api/costs
          # Proxy — HTTP(S)_PROXY for git and HTTP clients
          - name: PROXY_HOST
            value: devbot-proxy
          - name: HTTP_PROXY
            value: http://devbot-proxy:3128
          - name: HTTPS_PROXY
            value: http://devbot-proxy:3128
          - name: http_proxy
            value: http://devbot-proxy:3128
          - name: https_proxy
            value: http://devbot-proxy:3128
          - name: NO_PROXY
            value: devbot-memory-server,localhost,127.0.0.1
          - name: no_proxy
            value: devbot-memory-server,localhost,127.0.0.1
          # Secrets from Vault (devbot-secrets)
          - name: GPG_PRIVATE_KEY_B64
            valueFrom:
              secretKeyRef:
                name: devbot-secrets
                key: gh-bot-gpg-private
          - name: GH_TOKEN
            valueFrom:
              secretKeyRef:
                name: devbot-secrets
                key: gh-bot-cli-token
          - name: GITLAB_TOKEN
            valueFrom:
              secretKeyRef:
                name: devbot-secrets
                key: gl-bot-cli-token
          - name: GOOGLE_SA_KEY_B64
            valueFrom:
              secretKeyRef:
                name: devbot-secrets
                key: gcp-vertex-claude-sa
          - name: JIRA_URL
            value: https://redhat.atlassian.net
          - name: JIRA_USERNAME
            valueFrom:
              secretKeyRef:
                name: devbot-secrets
                key: jira-email
          - name: JIRA_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: devbot-secrets
                key: jira-token
          - name: SSO_USERNAME
            valueFrom:
              secretKeyRef:
                name: devbot-secrets
                key: e2e-username
          - name: SSO_PASSWORD
            valueFrom:
              secretKeyRef:
                name: devbot-secrets
                key: e2e-password
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 4Gi
